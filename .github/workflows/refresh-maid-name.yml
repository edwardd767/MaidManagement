name: Refresh maid name

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/refresh-maid-name.yml'

permissions:
  contents: write

jobs:
  update-name:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Update index page
        run: |
          sed -i 's/Maid Code: 201 | FIN HO/Maid Code: 201 | Arikha/g' index.html
          sed -i 's/Maid Code: 201 | ARIKHA/Maid Code: 201 | Arikha/g' index.html
          echo "<!-- refresh maid name -->" >> index.html

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Refresh maid profile name" || exit 0
          git push
