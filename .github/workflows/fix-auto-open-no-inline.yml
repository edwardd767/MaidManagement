name: Fix Auto Open No Inline
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          old = "document.getElementById('autoAssignModal').style.display='flex';"
          if old in html:
              html = html.replace(old, '')
              p.write_text(html, encoding='utf-8')
          PY
      - name: Commit
        run: |
          git config user.name "github-actions-bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Remove Auto Assign inline display"
          git push
