name: Add Hotel Settings Room Card
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch Hotel Settings flow
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          original = html

          settings_page = '<section class="page" id="hotelSettingsPage"><div class="hero"><div class="hero-content"><div class="kicker">HMS</div><div class="title">Bird of Paradise Hotel &amp; Resort</div></div><div class="hero-bottom"><span>... / Hotel Settings</span><span>Hotel Settings</span></div></div><div class="card" id="roomSetupCard"><div class="card-icon"><span class="material-symbols-rounded feature-card-icon" style="color:#23a8e0">public</span></div><div><div class="card-title">Room</div><div class="secondary" style="color:#111">Guest Room Setup.</div></div><div class="arrow">›</div></div></section>'
          if 'id="hotelSettingsPage"' not in html:
              html = html.replace('<section class="page" id="roomsPage">', settings_page + '<section class="page" id="roomsPage">', 1)

          html = html.replace('pages=[maidPage,onDutyPage,onDutyDetailPage,assignmentPage,roomsPage,profilePage,newProfilePage,prodPage,cleanPage,digitalPage,reportPage]', 'pages=[maidPage,hotelSettingsPage,onDutyPage,onDutyDetailPage,assignmentPage,roomsPage,profilePage,newProfilePage,prodPage,cleanPage,digitalPage,reportPage]')
          html = html.replace('hotelMenu.onclick=()=>openPage(roomsPage);', 'hotelMenu.onclick=()=>openPage(hotelSettingsPage);')
          if 'roomSetupCard.onclick=()=>openPage(roomsPage);' not in html:
              html = html.replace('digitalMenu.onclick=()=>openPage(digitalPage);', 'digitalMenu.onclick=()=>openPage(digitalPage);roomSetupCard.onclick=()=>openPage(roomsPage);', 1)

          if html != original:
              p.write_text(html, encoding='utf-8')
          PY
      - name: Commit Hotel Settings Room card
        run: |
          git config user.name "github-actions-bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Add Hotel Settings Room card before room list"
          git push
