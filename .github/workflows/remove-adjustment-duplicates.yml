name: Remove Adjustment Duplicate Rooms
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove duplicate adjustment rooms
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          old = "[['1102',2],['5101',2],['1102',2],['5101',2],['5101',2],['1104',3],['6201',4],['1104',3],['6201',4],['6201',4]]"
          new = "[['1102',2],['5101',2],['1104',3],['6201',4]]"
          html2 = html.replace(old, new)
          if html2 != html:
              p.write_text(html2, encoding='utf-8')
          PY
      - name: Commit duplicate removal
        run: |
          git config user.name "github-actions-bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Remove duplicate adjustment room numbers"
          git push
