name: Stack Hotel Settings Cards
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stack cards vertically
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          original = html
          old = '.settings-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.settings-grid .card{margin:0;height:82px}'
          new = '.settings-grid{display:grid;grid-template-columns:1fr;gap:10px;max-width:100%}.settings-grid .card{margin:0;height:82px;width:100%}'
          html = html.replace(old, new)
          if html != original:
              p.write_text(html, encoding='utf-8')
          PY
      - name: Commit patch and remove workflow
        run: |
          rm -f .github/workflows/stack-hotel-settings-cards.yml
          git config user.name "github-actions-bot"
          git config user.email "actions@github.com"
          git add index.html .github/workflows/stack-hotel-settings-cards.yml
          git diff --cached --quiet || git commit -m "Stack Hotel Settings cards vertically"
          git push
