name: Digital Reporting Only Maid Productivity
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keep only Maid Productivity Listing
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('index.html')
          html = p.read_text(encoding='utf-8')

          digital_section = '''<section class="page" id="digitalPage"><div class="hero"><div class="hero-content"><div class="kicker">HMS</div><div class="title">HOTEL PARADISE</div></div><div class="hero-bottom"><span>... / Digital Reporting</span><span>Digital Report</span></div></div><div class="toolbar"><span>Search here...</span><span>Housekeeping ⌄</span></div><div class="list"><div class="list-card report-card" id="reportCard"><div><div class="primary">Maid Productivity Listing</div><div class="secondary">Description</div></div><div class="arrow">›</div></div></div></section>'''

          start = html.find('<section class="page" id="digitalPage">')
          end = html.find('<section class="page" id="reportPage">')
          if start != -1 and end != -1 and start < end:
              html = html[:start] + digital_section + '\n' + html[end:]
              p.write_text(html, encoding='utf-8')
          PY
      - name: Commit patch and remove workflow
        run: |
          rm -f .github/workflows/digital-reporting-only-maid-productivity.yml
          git config user.name "github-actions-bot"
          git config user.email "actions@github.com"
          git add index.html .github/workflows/digital-reporting-only-maid-productivity.yml
          git diff --cached --quiet || git commit -m "Keep only Maid Productivity Listing in Digital Reporting"
          git push
