# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply HotelX UI patches
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('index.html')
          html = p.read_text(encoding='utf-8')

          # Hotel Settings cards should stack vertically.
          html = html.replace(
              '.settings-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.settings-grid .card{margin:0;height:82px}',
              '.settings-grid{display:grid;grid-template-columns:1fr;gap:10px;max-width:100%}.settings-grid .card{margin:0;height:82px;width:100%}'
          )

          # Keep only the required side menu items.
          nav = '''<aside class="sidebar"><ul class="nav"><li class="nav-item maid-management" id="maidMenu"><span class="icon">🧹</span><span>Maid<br>Management</span></li><li class="nav-item" id="businessInsightsMenu"><span class="icon">📊</span><span>Business Insights</span></li><li class="nav-item" id="digitalMenu"><span class="icon">📊</span><span>Digital Reporting</span></li><li class="nav-item" id="hotelMenu"><span class="icon">⚙️</span><span>Hotel Settings</span></li></ul></aside>'''
          start = html.find('<aside class="sidebar"><ul class="nav">')
          if start != -1:
              end = html.find('</ul></aside>', start)
              if end != -1:
                  html = html[:start] + nav + html[end + len('</ul></aside>'):]

          # Restore border/card styling for New Maid Profile form.
          form_css = '.form-card{background:#fff!important;border:1px solid #ddd!important;border-radius:6px!important;box-shadow:0 1px 4px #0003!important;padding:18px!important;width:100%!important;min-height:180px!important}'
          if 'min-height:180px!important' not in html:
              html = html.replace('</style>', form_css + '\n</style>', 1)

          # Add Business Insights screen CSS.
          bi_css = r'''
          .bi-hero{position:relative;min-height:126px;background:linear-gradient(135deg,#ff9b16 0%,#ff6f1e 68%,#ff7b2b 100%);overflow:hidden;margin:-8px -4px 18px;border-radius:0;box-shadow:0 1px 4px #0003;color:#fff;padding:18px 24px 18px 78px}.bi-hero:before{content:'';position:absolute;width:720px;height:210px;border-radius:50%;background:#ffc928;left:360px;top:48px;opacity:.76}.bi-hero:after{content:'';position:absolute;width:900px;height:240px;border-radius:50%;background:#e86616;left:390px;top:-130px;opacity:.42}.bi-back{position:absolute;left:18px;top:18px;width:42px;height:42px;border-radius:6px;background:#fff;color:#f58220;display:flex;align-items:center;justify-content:center;font-size:31px;font-weight:900;z-index:2}.bi-sync{position:absolute;right:22px;top:22px;width:38px;height:38px;border-radius:50%;background:#fff;color:#f58220;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;z-index:2}.bi-brand{position:relative;z-index:2;font-size:24px;font-weight:900;letter-spacing:.3px}.bi-brand .x{font-size:32px}.bi-sub{position:relative;z-index:2;font-size:17px;font-weight:800;margin-top:-2px}.bi-title{position:relative;z-index:2;color:#111;font-size:25px;font-weight:900;margin-top:20px;display:flex;align-items:center;gap:16px}.bi-title .material-symbols-rounded{color:#8b5600;font-size:31px}.bi-filters{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:20px;align-items:start}.bi-field{position:relative;height:62px;background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 1px 6px #0002;padding:8px 14px;display:flex;align-items:center;justify-content:space-between}.bi-label{position:static;margin:0 0 5px 0;font-size:13px;line-height:1;font-weight:700;color:#555;background:transparent;padding:0}.bi-value{font-size:17px;font-weight:700;color:#111;line-height:1.2}.bi-field>div:first-child{min-width:0}.bi-field .material-symbols-rounded{font-size:28px;color:#777}.bi-search{gap:12px;justify-content:flex-start;color:#999}.bi-search .bi-value{color:#aaa}.bi-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:22px}.bi-kpi,.bi-chart,.bi-summary{background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 1px 6px #0002}.bi-kpi{height:118px;display:flex;align-items:center;padding:18px 20px;gap:22px}.bi-icon{width:74px;height:74px;border-radius:50%;background:#fff1df;color:#f58220;display:flex;align-items:center;justify-content:center;flex:0 0 auto}.bi-icon .material-symbols-rounded{font-size:43px;color:#f58220}.bi-kpi-name{font-size:16px;font-weight:900}.bi-kpi-value{font-size:40px;line-height:1;color:#f47f20;font-weight:900;margin-top:8px}.bi-small{font-size:17px;color:#111;font-weight:700;margin-left:6px}.bi-chart{padding:18px 28px 18px;margin-bottom:22px}.bi-chart-head{display:flex;align-items:center;justify-content:space-between;font-size:20px;font-weight:900;margin-bottom:16px}.bi-date{font-size:15px;color:#666;font-weight:700}.bi-plot{height:278px;display:grid;grid-template-columns:70px 1fr;grid-template-rows:1fr 34px}.bi-y{grid-row:1;display:flex;align-items:center;justify-content:center;writing-mode:vertical-rl;transform:rotate(180deg);font-weight:700}.bi-bars{position:relative;display:flex;align-items:flex-end;justify-content:space-around;border-left:2px solid #777;border-bottom:2px solid #777;background:repeating-linear-gradient(to top,transparent 0,transparent 56px,#e5e5e5 57px);padding:0 46px}.bi-bar{width:13%;max-width:126px;min-width:58px;background:linear-gradient(#ffc45b,#ffab31);position:relative}.bi-bar span{position:absolute;top:-26px;left:0;right:0;text-align:center;color:#f47f20;font-weight:900;font-size:18px}.bi-xlabels{grid-column:2;display:flex;justify-content:space-around;align-items:center;font-size:15px;color:#333}.bi-xname{grid-column:2;text-align:center;font-weight:800;margin-top:-4px}.bi-summary{display:grid;grid-template-columns:repeat(3,1fr);min-height:110px;margin-bottom:18px}.bi-summary-item{display:flex;align-items:center;justify-content:center;gap:22px;padding:18px}.bi-summary-item:not(:last-child){border-right:1px solid #ddd}.bi-summary-label{font-size:16px;font-weight:900}.bi-summary-value{font-size:34px;line-height:1;color:#f47f20;font-weight:900;margin-top:7px}.bi-export-wrap{text-align:center}.bi-export{height:48px;min-width:190px;border:0;border-radius:6px;background:#ff970f;color:#fff;font-family:Nunito;font-size:18px;font-weight:900;box-shadow:0 3px 8px #0003;cursor:pointer}.bi-export .material-symbols-rounded{vertical-align:middle;margin-right:9px}@media(max-width:1100px){.bi-filters,.bi-kpis{grid-template-columns:repeat(2,1fr)}.bi-summary{grid-template-columns:1fr}.bi-summary-item:not(:last-child){border-right:0;border-bottom:1px solid #ddd}.bi-bars{padding:0 18px}.bi-bar{width:18%;min-width:34px}.bi-xlabels{font-size:13px}}@media(max-width:560px){.bi-hero{margin:-2px -2px 12px;padding:14px 12px 14px 60px;min-height:104px}.bi-back{left:12px;top:14px;width:36px;height:36px}.bi-sync{right:12px;top:14px;width:32px;height:32px}.bi-brand{font-size:18px}.bi-brand .x{font-size:24px}.bi-sub{font-size:13px}.bi-title{font-size:18px;margin-top:14px;gap:10px}.bi-filters,.bi-kpis{grid-template-columns:1fr;gap:10px}.bi-field{height:56px}.bi-kpi{height:92px;padding:12px 14px}.bi-icon{width:58px;height:58px}.bi-icon .material-symbols-rounded{font-size:34px}.bi-kpi-value{font-size:31px}.bi-chart{padding:14px 10px}.bi-chart-head{font-size:16px;display:block}.bi-date{margin-top:4px}.bi-plot{height:250px;grid-template-columns:42px 1fr}.bi-y{font-size:12px}.bi-bars{padding:0 7px}.bi-bar{min-width:28px;width:17%}.bi-xlabels{font-size:10px}.bi-summary-item{justify-content:flex-start}.bi-export{width:100%;height:46px}}
          '''
          if '.bi-hero' not in html:
              html = html.replace('</style>', bi_css + '\n</style>', 1)

          # Add Business Insights page if not already present.
          bi_section = r'''
          <section class="page" id="businessInsightsPage">
            <div class="bi-hero"><div class="bi-back">‹</div><div class="bi-sync">↻</div><div class="bi-brand">HOTEL<span class="x">X</span></div><div class="bi-sub">Business Insights</div><div class="bi-title"><span class="material-symbols-rounded">monitoring</span><span>Maid Productivity Analysis</span></div></div>
            <div class="bi-filters"><div class="bi-field"><div><div class="bi-label">Start Date</div><div class="bi-value">01 May 2026</div></div><span class="material-symbols-rounded">calendar_month</span></div><div class="bi-field"><div><div class="bi-label">End Date</div><div class="bi-value">09 Jul 2026</div></div><span class="material-symbols-rounded">calendar_month</span></div><div class="bi-field bi-search"><span class="material-symbols-rounded">search</span><div class="bi-value">Search maid...</div></div><div class="bi-field"><div><div class="bi-label">Analysis By</div><div class="bi-value">Maid</div></div><span class="material-symbols-rounded">expand_more</span></div></div>
            <div class="bi-kpis"><div class="bi-kpi"><div class="bi-icon"><span class="material-symbols-rounded">cleaning_services</span></div><div><div class="bi-kpi-name">Maid On Duty</div><div class="bi-kpi-value">12</div></div></div><div class="bi-kpi"><div class="bi-icon"><span class="material-symbols-rounded">hotel</span></div><div><div class="bi-kpi-name">Rooms Cleaned</div><div class="bi-kpi-value">156</div></div></div><div class="bi-kpi"><div class="bi-icon"><span class="material-symbols-rounded">schedule</span></div><div><div class="bi-kpi-name">Avg Cleaning Time</div><div class="bi-kpi-value">24<span class="bi-small">min</span></div></div></div><div class="bi-kpi"><div class="bi-icon"><span class="material-symbols-rounded">workspace_premium</span></div><div><div class="bi-kpi-name">Total HK Points</div><div class="bi-kpi-value">1,245</div></div></div></div>
            <div class="bi-chart"><div class="bi-chart-head"><span>Rooms Cleaned by Maid</span><span class="bi-date">01 May 2026 – 09 Jul 2026</span></div><div class="bi-plot"><div class="bi-y">Rooms Cleaned</div><div class="bi-bars"><div class="bi-bar" style="height:78%"><span>78</span></div><div class="bi-bar" style="height:64%"><span>64</span></div><div class="bi-bar" style="height:92%"><span>92</span></div><div class="bi-bar" style="height:54%"><span>54</span></div></div><div></div><div class="bi-xlabels"><span>Cassandra</span><span>Edward</span><span>Mark Goh</span><span>Syuhaidah</span></div><div></div><div class="bi-xname">Maid</div></div></div>
            <div class="bi-summary"><div class="bi-summary-item"><div class="bi-icon"><span class="material-symbols-rounded">groups</span></div><div><div class="bi-summary-label">Avg Rooms / Maid</div><div class="bi-summary-value">13.0</div></div></div><div class="bi-summary-item"><div class="bi-icon"><span class="material-symbols-rounded">assignment_turned_in</span></div><div><div class="bi-summary-label">Completed Rooms</div><div class="bi-summary-value">156</div></div></div><div class="bi-summary-item"><div class="bi-icon"><span class="material-symbols-rounded">schedule</span></div><div><div class="bi-summary-label">In Progress</div><div class="bi-summary-value">18</div></div></div></div><div class="bi-export-wrap"><button class="bi-export"><span class="material-symbols-rounded">download</span>Export</button></div>
          </section>
          '''
          if 'id="businessInsightsPage"' not in html:
              html = html.replace('<section class="page" id="digitalPage">', bi_section + '\n<section class="page" id="digitalPage">', 1)

          if 'businessInsightsMenu.onclick' not in html:
              html = html.replace('digitalMenu.onclick=()=>openPage(digitalPage);', 'if(window.businessInsightsMenu)businessInsightsMenu.onclick=()=>openPage(businessInsightsPage);digitalMenu.onclick=()=>openPage(digitalPage);')

          p.write_text(html, encoding='utf-8')
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
