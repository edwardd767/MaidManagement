name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject mini runtime patch
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          html = html.replace('Bird of Paradise Hotel &amp; Resort', 'HOTEL PARADISE')
          html = html.replace('Bird of Paradise Hotel & Resort', 'HOTEL PARADISE')
          for old in ['6','7','8','9']:
              html = html.replace(f'patch-roomtype-mini.css?v={old}', 'patch-roomtype-mini.css?v=10')
              html = html.replace(f'patch-roomtype-mini.js?v={old}', 'patch-roomtype-mini.js?v=10')
          for old in ['1','2']:
              html = html.replace(f'patch-bi-estimate.css?v={old}', 'patch-bi-estimate.css?v=3')
              html = html.replace(f'patch-bi-estimate.js?v={old}', 'patch-bi-estimate.js?v=3')
          for old in ['1','2','3']:
              html = html.replace(f'patch-bi-tooltips.css?v={old}', 'patch-bi-tooltips.css?v=4')
              html = html.replace(f'patch-bi-tooltips.js?v={old}', 'patch-bi-tooltips.js?v=4')
          html = html.replace('patch-bi-label.js?v=1', 'patch-bi-label.js?v=2')
          for old in ['1','2']:
              html = html.replace(f'patch-bi-modern.css?v={old}', 'patch-bi-modern.css?v=3')
              html = html.replace(f'patch-bi-modern.js?v={old}', 'patch-bi-modern.js?v=3')
          if 'patch-roomtype-mini.css?v=10' not in html:
              html = html.replace('</head>', '<link rel="stylesheet" href="patch-roomtype-mini.css?v=10">\n<script src="patch-roomtype-mini.js?v=10" defer></script>\n</head>')
          if 'patch-bi-estimate.css?v=3' not in html:
              html = html.replace('</head>', '<link rel="stylesheet" href="patch-bi-estimate.css?v=3">\n<script src="patch-bi-estimate.js?v=3" defer></script>\n</head>')
          if 'patch-bi-modern.css?v=3' not in html:
              html = html.replace('</head>', '<link rel="stylesheet" href="patch-bi-modern.css?v=3">\n<script src="patch-bi-modern.js?v=3" defer></script>\n</head>')
          if 'patch-bi-tooltips.css?v=4' not in html:
              html = html.replace('</head>', '<link rel="stylesheet" href="patch-bi-tooltips.css?v=4">\n<script src="patch-bi-tooltips.js?v=4" defer></script>\n</head>')
          if 'patch-bi-label.js?v=2' not in html:
              html = html.replace('</head>', '<script src="patch-bi-label.js?v=2" defer></script>\n</head>')
          p.write_text(html, encoding='utf-8')
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
