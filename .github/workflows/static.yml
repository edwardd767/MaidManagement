name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject mini runtime patch
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          html = html.replace('Bird of Paradise Hotel &amp; Resort', 'HOTEL PARADISE')
          html = html.replace('Bird of Paradise Hotel & Resort', 'HOTEL PARADISE')
          html = html.replace('patch-roomtype-mini.css?v=6', 'patch-roomtype-mini.css?v=9')
          html = html.replace('patch-roomtype-mini.js?v=6', 'patch-roomtype-mini.js?v=9')
          html = html.replace('patch-roomtype-mini.css?v=7', 'patch-roomtype-mini.css?v=9')
          html = html.replace('patch-roomtype-mini.js?v=7', 'patch-roomtype-mini.js?v=9')
          html = html.replace('patch-roomtype-mini.css?v=8', 'patch-roomtype-mini.css?v=9')
          html = html.replace('patch-roomtype-mini.js?v=8', 'patch-roomtype-mini.js?v=9')
          html = html.replace('patch-bi-estimate.css?v=1', 'patch-bi-estimate.css?v=2')
          html = html.replace('patch-bi-estimate.js?v=1', 'patch-bi-estimate.js?v=2')
          if 'patch-roomtype-mini.css?v=9' not in html:
              html = html.replace('</head>', '<link rel="stylesheet" href="patch-roomtype-mini.css?v=9">\n<script src="patch-roomtype-mini.js?v=9" defer></script>\n</head>')
          if 'patch-bi-estimate.css?v=2' not in html:
              html = html.replace('</head>', '<link rel="stylesheet" href="patch-bi-estimate.css?v=2">\n<script src="patch-bi-estimate.js?v=2" defer></script>\n</head>')
          p.write_text(html, encoding='utf-8')
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
