# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment and cancel stale runs so the latest UI is deployed.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply HotelX UI patches
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('index.html')
          html = p.read_text(encoding='utf-8')

          # Keep Hotel Settings cards stacked vertically.
          html = html.replace(
              '.settings-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.settings-grid .card{margin:0;height:82px}',
              '.settings-grid{display:grid;grid-template-columns:1fr;gap:10px;max-width:100%}.settings-grid .card{margin:0;height:82px;width:100%}'
          )

          # Remove strikethrough from Business Insights in the side menu.
          html = html.replace(
              '<li class="nav-item strike"><span class="icon">📊</span><span>Business Insights</span></li>',
              '<li class="nav-item"><span class="icon">📊</span><span>Business Insights</span></li>'
          )

          p.write_text(html, encoding='utf-8')
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
