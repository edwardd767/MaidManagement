name: Patch Duty Add Button
on:
  workflow_dispatch:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          old = "fab.onclick=()=>{if(profilePage.classList.contains('active'))openPage(newProfilePage)};"
          new = "fab.onclick=()=>{if(profilePage.classList.contains('active'))openPage(newProfilePage);else if(onDutyPage.classList.contains('active'))openPage(onDutyDetailPage)};"
          if old in html:
              html = html.replace(old, new, 1)
          p.write_text(html, encoding='utf-8')
          PY
      - name: Commit
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Open Maid On Duty detail from add button"
          git push
