name: Add Assignment Legend Tooltips
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch tooltip CSS and legend icons
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          original = html

          css = ".tooltip-icon{position:relative;display:inline-flex;align-items:center;justify-content:center}.tooltip-icon:hover:after{content:attr(data-tip);position:absolute;bottom:34px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:7px 10px;border-radius:5px;font-size:13px;font-weight:800;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.25);z-index:50000}.tooltip-icon:hover:before{content:'';position:absolute;bottom:27px;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:#333;z-index:50000}@media(max-width:560px){.tooltip-icon:hover:after{font-size:11px;bottom:27px;padding:5px 8px}.tooltip-icon:hover:before{bottom:20px}}"
          if '.tooltip-icon:hover:after' not in html:
              html = html.replace('</style>', css + '</style>', 1)

          html = html.replace('<span class="box"></span><span>100</span>', '<span class="box tooltip-icon" data-tip="No of Rooms" title="No of Rooms"></span><span>100</span>', 1)
          html = html.replace('<span class="round">🏨</span><span>500</span>', '<span class="round tooltip-icon" data-tip="Housekeeping Points" title="Housekeeping Points">🏨</span><span>500</span>', 1)
          html = html.replace('<span class="round">🧹</span><span>5</span>', '<span class="round tooltip-icon" data-tip="Maid on Duty" title="Maid on Duty">🧹</span><span>5</span>', 1)
          html = html.replace('<span class="round">🏨</span><span>100</span>', '<span class="round tooltip-icon" data-tip="Total/No of Maid on Duty" title="Total/No of Maid on Duty">🏨</span><span>100</span>', 1)

          if html != original:
              p.write_text(html, encoding='utf-8')
          PY
      - name: Commit tooltip patch
        run: |
          git config user.name "github-actions-bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Add tooltips to assignment legend icons"
          git push
