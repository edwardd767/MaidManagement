name: Patch Room Type HK Points Cleaning Time
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch Room Type fields
        run: |
          python - <<'PY'
          from pathlib import Path

          old = '''<div class="rt-field"><div class="rt-label"></div><div class="rt-value rt-muted">Housekeeping Points</div></div>
                  <div class="rt-field full"><div class="rt-label">Overbooking Allowed</div><div class="rt-value">5</div></div>'''
          new = '''<div class="rt-field"><div class="rt-label">Housekeeping Points</div><div class="rt-value">10</div></div>
                  <div class="rt-field"><div class="rt-label">Overbooking Allowed</div><div class="rt-value">5</div></div>
                  <div class="rt-field"><div class="rt-label">Estimated Cleaning Time(Mins)</div><div class="rt-value">20</div></div>'''

          old_alt = '''<div class="rt-field"><div class="rt-label">Housekeeping Points</div><div class="rt-value rt-muted">Housekeeping Points</div></div>
                  <div class="rt-field full"><div class="rt-label">Overbooking Allowed</div><div class="rt-value">5</div></div>'''

          changed = False
          for file_name in ['index.html', '.github/workflows/static.yml']:
              p = Path(file_name)
              if not p.exists():
                  continue
              text = p.read_text(encoding='utf-8')
              original = text
              text = text.replace(old, new)
              text = text.replace(old_alt, new)

              # Fallback for existing Room Type page where HK Points already exists without value.
              if 'Estimated Cleaning Time(Mins)' not in text and 'Housekeeping Points' in text and 'id="roomTypePage"' in text:
                  text = text.replace(
                      '<div class="rt-field full"><div class="rt-label">Overbooking Allowed</div><div class="rt-value">5</div></div>',
                      '<div class="rt-field"><div class="rt-label">Overbooking Allowed</div><div class="rt-value">5</div></div>\n                  <div class="rt-field"><div class="rt-label">Estimated Cleaning Time(Mins)</div><div class="rt-value">20</div></div>'
                  )
                  text = text.replace(
                      '<div class="rt-field"><div class="rt-label"></div><div class="rt-value rt-muted">Housekeeping Points</div></div>',
                      '<div class="rt-field"><div class="rt-label">Housekeeping Points</div><div class="rt-value">10</div></div>'
                  )

              if text != original:
                  p.write_text(text, encoding='utf-8')
                  changed = True

          if not changed:
              print('No matching Room Type block found; no changes written.')
          PY
      - name: Commit patch and remove workflow
        run: |
          rm -f .github/workflows/patch-roomtype-hkpoints-cleaning-time.yml
          git config user.name "github-actions-bot"
          git config user.email "actions@github.com"
          git add index.html .github/workflows/static.yml .github/workflows/patch-roomtype-hkpoints-cleaning-time.yml
          git diff --cached --quiet || git commit -m "Update Room Type housekeeping points and cleaning time"
          git push
