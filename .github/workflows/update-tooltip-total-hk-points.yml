name: Update Tooltip Total HK Points
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update tooltip wording
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          html = html.replace('Total/No of Maid on Duty', 'Total HK Points / No of Maid on Duty')
          p.write_text(html, encoding='utf-8')
          PY
      - name: Commit tooltip wording
        run: |
          git config user.name "github-actions-bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Update tooltip wording for total HK points"
          git push
