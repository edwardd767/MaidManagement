name: Update maid profile name

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/update-maid-profile-name.yml'

permissions:
  contents: write

jobs:
  update-name:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Update maid profile name
        run: |
          sed -i 's/Maid Code: 201 | FIN HO/Maid Code: 201 | ARIKHA/g' index.html
          git rm .github/workflows/update-maid-profile-name.yml

      - name: Commit and push change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to commit"
          else
            git add index.html
            git commit -m "Update maid profile name to Arikha"
            git push
          fi
